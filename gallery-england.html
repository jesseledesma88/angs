<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>England Gallery | Ang's Savvy Travel Guide</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { green: '#7BAA5D', blue: '#4A9CAF', gold: '#D9A343', sand: '#F3EFE2', charcoal: '#3D3E3C', white: '#FFFFFF' }
                    },
                    fontFamily: { heading: ['"Open Sans"', 'sans-serif'], body: ['"Raleway"', 'sans-serif'], }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #F3EFE2; color: #3D3E3C; }
        .hover-lift { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(61, 62, 60, 0.12); }
        .nav-link { position: relative; }
        .nav-link::after { content: ''; position: absolute; width: 100%; transform: scaleX(0); height: 2px; bottom: -4px; left: 0; background-color: #7BAA5D; transform-origin: bottom right; transition: transform 0.3s ease-out; }
        .nav-link:hover::after { transform: scaleX(1); transform-origin: bottom left; }
        .img-zoom-container { overflow: hidden; }
        .img-zoom { transition: transform 0.6s ease; }
        .img-zoom-container:hover .img-zoom { transform: scale(1.05); }
        
        /* Gallery Filtering Transitions */
        .gallery-item { transition: opacity 0.4s ease, transform 0.4s ease; }
        .gallery-item.hide { display: none; opacity: 0; transform: scale(0.95); }
        
        /* Video Play Button Overlay */
        .play-overlay { transition: background-color 0.3s ease; }
        .img-zoom-container:hover .play-overlay { background-color: rgba(61, 62, 60, 0.4); }
    </style>
</head>
<body class="font-body antialiased selection:bg-brand-green selection:text-white">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-16 pb-8 text-center">
        <a href="england.html" class="inline-flex items-center gap-2 text-brand-green font-heading font-bold uppercase tracking-widest text-xs mb-6 hover:text-brand-charcoal transition-colors">
            &larr; Back to England Guide
        </a>
        <h1 class="font-heading font-extrabold text-4xl md:text-5xl text-brand-charcoal mb-4">England Travel Gallery</h1>
        <p class="font-body text-brand-charcoal/80 text-lg leading-relaxed max-w-2xl mx-auto">
            A visual diary of my time exploring the historic streets, cozy pubs, and breathtaking countryside of England. 
        </p>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-16">
        
        <div class="flex flex-wrap items-center justify-center gap-3 mb-12">
            <button data-filter="all" class="filter-btn px-6 py-2 rounded-full font-heading font-bold text-sm tracking-wide shadow-sm transition-colors border border-transparent bg-brand-green text-white">All Media</button>
            <button data-filter="photo" class="filter-btn px-6 py-2 rounded-full font-heading font-bold text-sm tracking-wide transition-colors border border-gray-200 bg-white text-brand-charcoal hover:border-brand-green hover:text-brand-green">Photos</button>
            <button data-filter="video" class="filter-btn px-6 py-2 rounded-full font-heading font-bold text-sm tracking-wide transition-colors border border-gray-200 bg-white text-brand-charcoal hover:border-brand-green hover:text-brand-green">Videos</button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="gallery-container">
            
            <div class="gallery-item bg-white p-3 rounded-3xl shadow-sm border border-gray-100 hover-lift" data-category="photo">
                <div class="w-full aspect-[4/5] rounded-2xl img-zoom-container relative cursor-pointer">
                    <img src="https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?q=80&w=800&auto=format&fit=crop" alt="Big Ben" class="w-full h-full object-cover img-zoom">
                    <div class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-lg shadow-sm">
                        <span class="font-heading font-bold text-brand-charcoal text-xs">London</span>
                    </div>
                </div>
            </div>

            <div class="gallery-item bg-white p-3 rounded-3xl shadow-sm border border-gray-100 hover-lift" data-category="video">
                <div class="w-full aspect-[4/5] rounded-2xl img-zoom-container relative cursor-pointer">
                    <img src="https://images.unsplash.com/photo-1529655683823-dc58689bbed8?q=80&w=800&auto=format&fit=crop" alt="Walking Tour" class="w-full h-full object-cover img-zoom">
                    <div class="play-overlay absolute inset-0 bg-brand-charcoal/20 flex items-center justify-center">
                        <div class="w-14 h-14 bg-brand-green rounded-full flex items-center justify-center text-white shadow-lg transform transition-transform hover:scale-110">
                            <svg class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <div class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-lg shadow-sm">
                        <span class="font-heading font-bold text-brand-charcoal text-xs">Walking the Thames (Video)</span>
                    </div>
                </div>
            </div>

            <div class="gallery-item bg-white p-3 rounded-3xl shadow-sm border border-gray-100 hover-lift" data-category="photo">
                <div class="w-full aspect-[4/5] rounded-2xl img-zoom-container relative cursor-pointer">
                    <img src="https://images.unsplash.com/photo-1574888279813-f66100ed1cda?q=80&w=800&auto=format&fit=crop" alt="Bath Architecture" class="w-full h-full object-cover img-zoom">
                    <div class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-lg shadow-sm">
                        <span class="font-heading font-bold text-brand-charcoal text-xs">Roman Baths</span>
                    </div>
                </div>
            </div>

            <div class="gallery-item bg-white p-3 rounded-3xl shadow-sm border border-gray-100 hover-lift" data-category="photo">
                <div class="w-full aspect-video sm:aspect-[4/5] rounded-2xl img-zoom-container relative cursor-pointer">
                    <img src="https://images.unsplash.com/photo-1473896100090-53523650d4c6?q=80&w=800&auto=format&fit=crop" alt="English Countryside" class="w-full h-full object-cover img-zoom">
                    <div class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-lg shadow-sm">
                        <span class="font-heading font-bold text-brand-charcoal text-xs">The Cotswolds</span>
                    </div>
                </div>
            </div>

            <div class="gallery-item bg-white p-3 rounded-3xl shadow-sm border border-gray-100 hover-lift" data-category="photo">
                <div class="w-full aspect-[4/5] rounded-2xl img-zoom-container relative cursor-pointer">
                    <img src="https://images.unsplash.com/photo-1550117565-5df1e6b37494?q=80&w=800&auto=format&fit=crop" alt="Afternoon Tea" class="w-full h-full object-cover img-zoom">
                    <div class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-lg shadow-sm">
                        <span class="font-heading font-bold text-brand-charcoal text-xs">Afternoon Tea</span>
                    </div>
                </div>
            </div>

            <div class="gallery-item bg-white p-3 rounded-3xl shadow-sm border border-gray-100 hover-lift" data-category="video">
                <div class="w-full aspect-[4/5] rounded-2xl img-zoom-container relative cursor-pointer">
                    <img src="https://images.unsplash.com/photo-1549480119-947b1129f1b2?q=80&w=800&auto=format&fit=crop" alt="Train Journey" class="w-full h-full object-cover img-zoom">
                    <div class="play-overlay absolute inset-0 bg-brand-charcoal/20 flex items-center justify-center">
                        <div class="w-14 h-14 bg-brand-green rounded-full flex items-center justify-center text-white shadow-lg transform transition-transform hover:scale-110">
                            <svg class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <div class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-lg shadow-sm">
                        <span class="font-heading font-bold text-brand-charcoal text-xs">Train to Cornwall (Video)</span>
                    </div>
                </div>
            </div>

        </div>

        <div class="text-center mt-12">
            <button class="inline-block border-2 border-brand-green text-brand-green font-heading font-bold py-3 px-8 rounded-full hover:bg-brand-green hover:text-white transition-colors uppercase tracking-widest text-xs">
                Load More Memories
            </button>
        </div>

    </div>

    <script>
        // --- Gallery Category Filtering Logic ---
        const filterBtns = document.querySelectorAll('.filter-btn');
        const galleryItems = document.querySelectorAll('.gallery-item');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // 1. Reset all buttons to inactive styling
                filterBtns.forEach(b => {
                    b.classList.remove('bg-brand-green', 'text-white', 'shadow-sm', 'border-transparent');
                    b.classList.add('bg-white', 'text-brand-charcoal', 'border-gray-200');
                });
                
                // 2. Add active styling to clicked button
                btn.classList.remove('bg-white', 'text-brand-charcoal', 'border-gray-200');
                btn.classList.add('bg-brand-green', 'text-white', 'shadow-sm', 'border-transparent');

                // 3. Get filter value
                const filterValue = btn.getAttribute('data-filter');

                // 4. Show/Hide items based on category
                galleryItems.forEach(item => {
                    const itemCategory = item.getAttribute('data-category');
                    
                    if (filterValue === 'all' || itemCategory === filterValue) {
                        item.classList.remove('hide');
                        setTimeout(() => { item.style.opacity = '1'; }, 10);
                    } else {
                        item.classList.add('hide');
                    }
                });
            });
        });
    </script>
</body>
</html>
